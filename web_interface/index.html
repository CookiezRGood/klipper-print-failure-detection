<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Failure Detection</title>
</head>
<body>
    <h1>Print Failure Detection Settings</h1>

    <!-- Camera Snapshot -->
    <div>
        <h3>Camera Snapshot:</h3>
        <img id="camera-preview" src="" alt="Camera Feed" width="320" height="240">
    </div>

    <!-- SSIM Threshold Slider -->
    <div>
        <h3>SSIM Threshold:</h3>
        <input type="range" id="ssim-threshold" min="0" max="1" step="0.01" value="0.97">
        <p>Current value: <span id="ssim-value">0.97</span></p>
    </div>

    <!-- Stillness Threshold Slider -->
    <div>
        <h3>Stillness Threshold:</h3>
        <input type="range" id="stillness-threshold" min="0" max="1" step="0.05" value="0.20">
        <p>Current value: <span id="stillness-value">0.20</span></p>
    </div>

    <!-- Layer Step Slider -->
    <div>
        <h3>Layer Step (Auto-calculated):</h3>
        <input type="text" id="layer-step" value="0.15" readonly>
    </div>

    <!-- Status Display -->
    <div>
        <h3>Status:</h3>
        <p id="failure-status">Fetching...</p>
    </div>

    <!-- Trigger Actions -->
    <div>
        <button onclick="pausePrint()">Pause Print</button>
        <button onclick="cancelPrint()">Cancel Print</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
