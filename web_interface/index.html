<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failure Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Failure Detection</h2>
            <div id="status-indicator" class="status-badge">WAITING</div>
        </header>

        <div class="main-content">
            <div class="camera-section">
                <div class="camera-header">
                    <h3>Live Monitor</h3>
                    <label class="toggle-switch">
                        <input type="checkbox" id="debug-toggle">
                        <span class="slider"></span>
                        <span class="label-text">Show Mask</span>
                    </label>
                </div>
                <div id="camera-container">
                    <img id="live-image" class="live-feed" alt="Waiting..." />
                </div>
            </div>

            <div class="health-section">
                <div class="health-header">
                    <span>Confidence: <span id="ssim-val">--%</span></span>
                    <span>Retries: <span id="retry-val">0/0</span></span>
                </div>
                <div class="progress-track">
                    <div id="confidence-bar" class="progress-fill"></div>
                </div>
            </div>

            <div class="controls">
                <button id="open-settings-btn" class="secondary-btn">⚙️ Settings</button>
            </div>
        </div>
    </div>

    <dialog id="settings-modal">
        <div class="modal-header">
            <h3>Configuration</h3>
            <button id="close-modal-x" class="icon-btn">×</button>
        </div>
        <div class="modal-body">
            
            <div class="setting-group">
                <h4>Connections & Camera</h4>
                <div class="setting-row">
                    <label>Camera URL:</label>
                    <input type="text" id="camera_url">
                </div>
                <div class="setting-row">
                    <label>Aspect Ratio:</label>
                    <select id="aspect_ratio">
                        <option value="16:9">16:9 (Widescreen)</option>
                        <option value="4:3">4:3 (Standard)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>UI Refresh Rate (ms):</label>
                    <input type="number" id="preview_refresh_rate" step="50" min="100">
                </div>
                <div class="setting-row">
                    <label>Moonraker URL:</label>
                    <input type="text" id="moonraker_url" placeholder="http://127.0.0.1:7125">
                </div>
            </div>

            <div class="setting-group">
                <h4>Detection Logic</h4>
                <div class="setting-row">
                    <label>Check Interval (ms):</label>
                    <input type="number" id="check_interval" step="50" min="50">
                </div>
                <p class="help-text">
                    Note: To see smoother video, this must be equal to or lower than the UI Refresh Rate.
                </p>

                <div class="setting-row">
                    <label>SSIM Threshold:</label>
                    <input type="number" id="ssim_threshold" step="0.01" max="1">
                </div>
                <div class="setting-row">
                    <label>Mask Margin (px):</label>
                    <input type="number" id="mask_margin" step="1">
                </div>
            </div>

            <div class="setting-group">
                <h4>Actions</h4>
                <div class="setting-row">
                    <label>Max Retries:</label>
                    <input type="number" id="consecutive_failures" step="1">
                </div>
                <div class="setting-row">
                    <label>On Failure:</label>
                    <select id="on_failure">
                        <option value="nothing">Warning Only (Console)</option>
                        <option value="pause">Pause Print</option>
                        <option value="cancel">Cancel Print</option>
                    </select>
                </div>
            </div>

        </div>
        <div class="modal-footer">
            <button id="save-settings-btn" class="primary-btn">Save Configuration</button>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
