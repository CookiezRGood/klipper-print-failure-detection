<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failure Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Failure Detection</h2>
            <div id="status-indicator" class="status-badge">Loading...</div>
        </header>

        <div class="main-content">
            <div class="camera-section">
                <h3>Live Monitor</h3>
                <div id="camera-container">
                    <p>Waiting for camera...</p>
                </div>
            </div>

            <div class="settings-section">
                <h3>Settings</h3>
                <div class="setting-row">
                    <label>SSIM Threshold:</label>
                    <input type="number" id="ssim_threshold" step="0.01" min="0" max="1">
                </div>
                <div class="setting-row">
                    <label>Stillness Threshold:</label>
                    <input type="number" id="stillness_threshold" step="0.01">
                </div>
                <button id="save-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
