# ============================================================
#  Klipper Print Failure Detection - Configuration File
# ============================================================

# Camera Settings
camera_url: "http://192.168.10.153/webcam/?action=snapshot"

# Moonraker Settings
moonraker_url: "http://127.0.0.1:7125"

# Failure Detection Settings
check_interval: 5
ssim_threshold: 0.97
consecutive_failures: 3
on_failure: "pause"

# Layer Change Detection Settings
slicer_layer_height: 0.20  # User-defined slicer layer height (mm)
layer_trigger:
  enabled: true
  layer_min_step: 0.15  # Automatically calculated from slicer_layer_height (75% of slicer_layer_height)
  stillness_threshold: 0.20
  settle_time: 0.2  # Time to wait after Z change before SSIM trigger

# Dynamic Toolhead Masking
dynamic_mask:
  enabled: true
  min_area: 100
  margin_px: 10
  debug_save_overlays: true
  debug_dir: "/tmp/pfd_debug"

# Logging Settings
log_path: "/tmp/klipper-pfd.log"
