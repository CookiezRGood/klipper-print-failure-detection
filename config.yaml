camera_url: "http://192.168.10.153/webcam/?action=snapshot"

check_interval: 5          # seconds between checks
failure_threshold: 5000    # pixel difference threshold
consecutive_failures: 3    # require failure for N checks in a row

on_failure: "pause"        # "pause" or "cancel"

moonraker_url: "http://127.0.0.1:7125"  # Moonraker local API

log_path: "/tmp/klipper-pfd.log"
